naftiko: "1.0.0-alpha2"

info:
  label: "Nutritionix Track API v2 — Item"
  description: >-
    Item — Nutritionix Track API v2. 2 operations. Lead operation: Nutritionix
    Search Item. Look up detailed nutrition for branded and restaurant menu items
    by Nutritionix item identifier or UPC barcode. Self-contained Naftiko capability
    covering one Nutritionix business surface.
  tags:
    - Nutritionix
    - Nutrition
    - Item
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      NUTRITIONIX_APP_ID: NUTRITIONIX_APP_ID
      NUTRITIONIX_APP_KEY: NUTRITIONIX_APP_KEY

capability:

  consumes:
    - type: http
      namespace: "track-item"
      baseUri: "https://trackapi.nutritionix.com/v2"
      description: "Nutritionix Track API v2 — Item business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: x-app-key
        value: "{{env.NUTRITIONIX_APP_KEY}}"
        placement: header
      resources:
        - name: "search-item"
          path: "/search/item"
          operations:
            - name: "searchItem"
              method: GET
              description: "Retrieve full nutrition detail for a branded item by id or UPC."
              inputParameters:
                - name: "nix_item_id"
                  in: query
                  type: string
                  required: false
                  description: "The Nutritionix item identifier."
                - name: "upc"
                  in: query
                  type: string
                  required: false
                  description: "The UPC barcode of a branded grocery item."
                - name: "claims"
                  in: query
                  type: boolean
                  required: false
                  description: "Include marketing/regulatory claims in the response."
                - name: "allergens"
                  in: query
                  type: boolean
                  required: false
                  description: "Include allergen information in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "item"
          path: "/item"
          operations:
            - name: "getItem"
              method: GET
              description: "Legacy item lookup by id, resource id, or UPC."
              inputParameters:
                - name: "id"
                  in: query
                  type: string
                  required: false
                  description: "The item or resource identifier."
                - name: "upc"
                  in: query
                  type: string
                  required: false
                  description: "The UPC barcode of a branded grocery item."
                - name: "nix_item_id"
                  in: query
                  type: string
                  required: false
                  description: "The Nutritionix item identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "track-item-rest"
      port: 8080
      description: "REST adapter for Nutritionix Track API v2 — Item. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/search-item"
          name: "search-item"
          description: "REST surface for branded item lookup."
          operations:
            - method: GET
              name: "searchItem"
              description: "Retrieve full nutrition detail for a branded item by id or UPC."
              call: "track-item.searchItem"
              with:
                "nix_item_id": "rest.nix_item_id"
                "upc": "rest.upc"
                "claims": "rest.claims"
                "allergens": "rest.allergens"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/item"
          name: "item"
          description: "REST surface for legacy item lookup."
          operations:
            - method: GET
              name: "getItem"
              description: "Legacy item lookup by id, resource id, or UPC."
              call: "track-item.getItem"
              with:
                "id": "rest.id"
                "upc": "rest.upc"
                "nix_item_id": "rest.nix_item_id"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "track-item-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Nutritionix Track API v2 — Item. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "search-branded-item"
          description: "Retrieve full nutrition detail for a branded item by id or UPC."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "track-item.searchItem"
          with:
            "nix_item_id": "tools.nix_item_id"
            "upc": "tools.upc"
            "claims": "tools.claims"
            "allergens": "tools.allergens"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-item"
          description: "Legacy item lookup by id, resource id, or UPC."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "track-item.getItem"
          with:
            "id": "tools.id"
            "upc": "tools.upc"
            "nix_item_id": "tools.nix_item_id"
          outputParameters:
            - type: object
              mapping: "$."
