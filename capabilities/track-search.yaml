naftiko: "1.0.0-alpha2"

info:
  label: "Nutritionix Track API v2 — Search"
  description: >-
    Search — Nutritionix Track API v2. 1 operation. Lead operation: Nutritionix
    Search Instant. Typeahead search across common and branded foods for building
    food autocomplete experiences. Self-contained Naftiko capability covering one
    Nutritionix business surface.
  tags:
    - Nutritionix
    - Nutrition
    - Search
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      NUTRITIONIX_APP_ID: NUTRITIONIX_APP_ID
      NUTRITIONIX_APP_KEY: NUTRITIONIX_APP_KEY

capability:

  consumes:
    - type: http
      namespace: "track-search"
      baseUri: "https://trackapi.nutritionix.com/v2"
      description: "Nutritionix Track API v2 — Search business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: x-app-key
        value: "{{env.NUTRITIONIX_APP_KEY}}"
        placement: header
      resources:
        - name: "search-instant"
          path: "/search/instant"
          operations:
            - name: "searchInstant"
              method: GET
              description: "Typeahead search returning matched common and branded foods."
              inputParameters:
                - name: "query"
                  in: query
                  type: string
                  required: true
                  description: "The food search phrase."
                - name: "branded"
                  in: query
                  type: boolean
                  required: false
                  description: "Include branded foods in the results."
                - name: "common"
                  in: query
                  type: boolean
                  required: false
                  description: "Include common foods in the results."
                - name: "detailed"
                  in: query
                  type: boolean
                  required: false
                  description: "Return full nutrient detail for each result."
                - name: "branded_type"
                  in: query
                  type: integer
                  required: false
                  description: "Filter branded results by type (1 restaurant, 2 grocery)."
                - name: "locale"
                  in: query
                  type: string
                  required: false
                  description: "Locale code used to localize results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "track-search-rest"
      port: 8080
      description: "REST adapter for Nutritionix Track API v2 — Search. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/search-instant"
          name: "search-instant"
          description: "REST surface for instant food search."
          operations:
            - method: GET
              name: "searchInstant"
              description: "Typeahead search returning matched common and branded foods."
              call: "track-search.searchInstant"
              with:
                "query": "rest.query"
                "branded": "rest.branded"
                "common": "rest.common"
                "detailed": "rest.detailed"
                "branded_type": "rest.branded_type"
                "locale": "rest.locale"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "track-search-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Nutritionix Track API v2 — Search. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "search-instant-foods"
          description: "Typeahead search returning matched common and branded foods."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "track-search.searchInstant"
          with:
            "query": "tools.query"
            "branded": "tools.branded"
            "common": "tools.common"
            "detailed": "tools.detailed"
            "branded_type": "tools.branded_type"
            "locale": "tools.locale"
          outputParameters:
            - type: object
              mapping: "$."
